<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PFM — Premier Football Manager</title>
<meta name="description" content="PFM — Premier Football Manager. Build your dream club, sign stars, master tactics and win league titles. By RBK Studios.">
<style>
  html,body{margin:0;min-height:100%;background:#050507;color:#eef2f7;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center}
  main{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:48px 20px}
  .shield{position:relative;width:150px;height:168px;background:#d21f2f;
    clip-path:polygon(50% 0,100% 10%,100% 48%,50% 100%,0 48%,0 10%);
    display:flex;align-items:center;justify-content:center;margin-bottom:26px}
  .shield .inner{position:absolute;left:8px;right:8px;top:8px;bottom:8px;
    background:#0b0d12;clip-path:polygon(50% 0,100% 10%,100% 48%,50% 100%,0 48%,0 10%);
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:52px;letter-spacing:-.04em;color:#fff}
  h1{margin:0 0 6px;font-size:30px;font-weight:900;letter-spacing:-.02em}
  .sub{color:#9aa6b6;font-size:15px;max-width:480px;line-height:1.5;margin:0 0 30px}
  .btn{display:inline-block;background:#d21f2f;color:#fff;text-decoration:none;
    font-weight:800;font-size:15px;padding:14px 30px;border-radius:10px}
  .btn:hover{background:#e63946}
  .links{margin-top:34px;display:flex;gap:22px;flex-wrap:wrap;justify-content:center}
  .links a{color:#9aa6b6;font-size:13px;text-decoration:none;border-bottom:1px solid #222b38;padding-bottom:2px}
  .links a:hover{color:#eef2f7}
  footer{color:#5b6470;font-size:12px;padding:22px;text-align:center}
</style>
</head>
<body>
<main>
  <div class="shield"><div class="inner">PFM</div></div>
  <h1>Premier Football Manager</h1>
  <p class="sub">Build your dream club — sign stars, develop wonderkids, master
    tactics and take your team from survival scraps to league titles.</p>
  <a class="btn" href="https://play.google.com/store/apps/details?id=com.pfm.myapp">Get it on Google Play</a>
  <div class="links">
    <a href="https://rbkstudio.page.gd/">Privacy Policy</a>
    <a href="mailto:RBKstudiouk@gmail.com">Support</a>
    <a href="/app-ads.txt">app-ads.txt</a>
  </div>
</main>
<footer>© 2026 RBK Studios · Oldham, United Kingdom</footer>
</body>
</html>
